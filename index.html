<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Style Premium Album | @MalDev</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --tg-blue: #0088cc;
            --tg-premium: linear-gradient(135deg, #665fff, #8128f6, #9724ef);
            --gold: #d4af37;
            --gold-light: #fcf6ba;
            --dark-bg: #0e0e0e;
            --card-bg: #181818;
        }

        body {
            margin: 0; background-color: var(--dark-bg);
            background-image: radial-gradient(circle at 50% 50%, rgba(20, 20, 20, 1) 0%, rgba(5, 5, 5, 1) 100%);
            color: #fff; font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            overflow-x: hidden;
        }

        /* Background Sparkles */
        .stars { position: fixed; width: 100%; height: 100%; z-index: 0; pointer-events: none; }

        .container { width: 90%; max-width: 1000px; padding: 40px 0; z-index: 1; position: relative; }

        /* HEADER @MALDEV TELEGRAM STYLE */
        .brand-badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: rgba(255,255,255,0.05); padding: 10px 20px;
            border-radius: 50px; margin-bottom: 20px; border: 1px solid rgba(255,215,0,0.3);
        }

        /* Ikon Telegram Premium Blue Star */
        .tg-verify {
            width: 20px; height: 20px;
            background: var(--tg-blue);
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            display: inline-block; position: relative;
        }
        .tg-verify::after {
            content: '✓'; color: white; font-size: 12px; font-weight: bold;
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        }

        h1 { 
            font-size: 2.8rem; font-weight: 800; background: var(--gold-gradient);
            background: linear-gradient(to bottom, #fff 0%, var(--gold) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 5px 0;
        }

        /* UPLOAD BUTTON */
        .btn-upload {
            background: var(--tg-premium); color: white; border: none;
            padding: 16px 35px; border-radius: 50px; font-weight: 800;
            cursor: pointer; text-transform: uppercase; margin: 20px 0;
            box-shadow: 0 10px 20px rgba(102, 95, 255, 0.3); transition: 0.3s;
        }
        .btn-upload:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(102, 95, 255, 0.5); }

        /* GALLERY FRAME */
        .gallery-box {
            background: var(--card-bg); border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 25px; padding: 25px; margin-top: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        .grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px;
        }

        /* PHOTO CARD */
        .photo-card {
            background: #000; border-radius: 15px; overflow: hidden;
            position: relative; aspect-ratio: 1/1; border: 1px solid #222;
        }
        .photo-card img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .photo-card:hover img { transform: scale(1.1); filter: brightness(0.6); }

        /* Overlay Buttons (Download & Delete) */
        .card-actions {
            position: absolute; inset: 0; display: flex; justify-content: center;
            align-items: center; gap: 15px; opacity: 0; transition: 0.3s; background: rgba(0,0,0,0.4);
        }
        .photo-card:hover .card-actions { opacity: 1; }

        .action-btn {
            width: 40px; height: 40px; border-radius: 10px; border: none;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 18px; transition: 0.2s;
        }
        .dl-btn { background: var(--tg-blue); color: white; }
        .del-btn { background: #ff4757; color: white; }
        .action-btn:hover { transform: scale(1.1); }

        /* PRELOADER */
        #loader {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; justify-content: center; align-items: center; transition: 1s;
        }
    </style>
</head>
<body>

<div id="loader">
    <div style="text-align: center;">
        <div class="tg-verify" style="width: 40px; height: 40px; margin-bottom: 15px;"></div>
        <h2 style="color: white; letter-spacing: 5px;">@MALDEV</h2>
    </div>
</div>

<div class="container">
    <header style="text-align: center;">
        <div class="brand-badge">
            <span style="font-weight: 800; letter-spacing: 1px;">@MALDEV</span>
            <div class="tg-verify"></div>
        </div>
        <h1>Goldium 5.000</h1>
        <p id="status" style="color: #666; font-weight: 600;">0 / 5000 MEMORIES</p>
        
        <button class="btn-upload" onclick="document.getElementById('fileInp').click()">+ Add Memories</button>
        <input type="file" id="fileInp" multiple accept="image/*" style="display: none;">
    </header>

    <div class="gallery-box">
        <div style="color: var(--gold); font-weight: 800; margin-bottom: 20px; letter-spacing: 2px;">GALLERY</div>
        <div class="grid" id="galleryGrid"></div>
    </div>
</div>

<script>
    let db;
    const grid = document.getElementById('galleryGrid');

    // Preloader
    window.onload = () => {
        setTimeout(() => {
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => document.getElementById('loader').style.display = 'none', 1000);
        }, 1500);
    };

    // Database
    const request = indexedDB.open("MalDevFinalDB", 1);
    request.onupgradeneeded = e => {
        db = e.target.result;
        db.createObjectStore("photos", { keyPath: "id", autoIncrement: true });
    };
    request.onsuccess = e => { db = e.target.result; render(); };

    // Upload & Auto Resize
    document.getElementById('fileInp').onchange = (e) => {
        const files = e.target.files;
        Array.from(files).forEach(file => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const tx = db.transaction("photos", "readwrite");
                tx.objectStore("photos").add({ src: event.target.result, name: file.name });
                tx.oncomplete = render;
            };
        });
    };

    function render() {
        grid.innerHTML = "";
        const tx = db.transaction("photos", "readonly");
        const store = tx.objectStore("photos");
        const req = store.getAll();
        req.onsuccess = () => {
            document.getElementById('status').innerText = `${req.result.length} / 5000 MEMORIES`;
            req.result.reverse().forEach(item => {
                const div = document.createElement('div');
                div.className = 'photo-card';
                div.innerHTML = `
                    <img src="${item.src}">
                    <div class="card-actions">
                        <button class="action-btn dl-btn" onclick="downloadImage('${item.src}', '${item.name}')">⬇</button>
                        <button class="action-btn del-btn" onclick="hapus(${item.id})">✕</button>
                    </div>
                `;
                grid.appendChild(div);
            });
        };
    }

    // Fungsi Download Foto
    function downloadImage(base64, name) {
        const link = document.createElement('a');
        link.href = base64;
        link.download = name || "MalDev_Memory.jpg";
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    function hapus(id) {
        if(confirm("Hapus memori ini?")) {
            const tx = db.transaction("photos", "readwrite");
            tx.objectStore("photos").delete(id);
            tx.oncomplete = render;
        }
    }
</script>

</body>
</html>
